name: Build and release cli-autoclicker

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64]
        backend: [x11, wayland]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              gcc libc6-dev \
              libx11-dev libxtst-dev libpng-dev \
              libxcb1-dev libx11-xcb-dev \
              libxkbcommon-dev libxkbcommon-x11-dev \
              libxcb-xkb-dev libxinerama-dev libxrandr-dev \
              xsel xclip

      - name: Environment variables
        id: vars
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

          BINARY_NAME="cli-autoclicker"

          echo "filename=${BINARY_NAME}-${TAG_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}-${{ matrix.backend }}" >> $GITHUB_OUTPUT

      - name: Compile go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1

        run: |
          # If the matrix is on 'wayland', pass the wayland build tag to Go
          if [ "${{ matrix.backend }}" = "wayland" ]; then
            go build -v -tags wayland -ldflags="-w -s" -o ${{ steps.vars.outputs.filename }} .
          else
            go build -v -ldflags="-w -s" -o ${{ steps.vars.outputs.filename }} .
          fi

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: ${{steps.vars.outputs.filename}}
          tag_name: ${{steps.vars.outputs.tag}}
          name: Release ${{steps.vars.outputs.tag}}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
